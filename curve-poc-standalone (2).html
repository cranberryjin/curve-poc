// ============================================================
// CURVE FORMULA ENGINE

const AGE_BANDS = [
  { no:1, band:"0–2", social:"Infant", nap:true, mode:"Baby curve", am_ce:0, am_wd:0, am_amp:0, pm_ce:0, pm_wd:0, pm_amp:0, dip_ce:0, dip_wd:0, dip_amp:0, msf_ce:0 },

  { no:9, band:"25–29", social:"Early workforce", nap:false, mode:"Two-peak (drifting earlier)", am_ce:10.5, am_wd:2.1, am_amp:0.7125, pm_ce:18.5, pm_wd:2.3, pm_amp:0.7125, dip_ce:14.25, dip_wd:1.2, dip_amp:0.11, msf_ce:3.25 },
  { no:10, band:"30–34", social:"Workforce", nap:false, mode:"Two-peak (core cohort)", am_ce:10.25, am_wd:2.2, am_amp:0.75, pm_ce:18.25, pm_wd:2.3, pm_amp:0.735, dip_ce:14, dip_wd:1.2, dip_amp:0.105, msf_ce:3 },
  { no:11, band:"35–39", social:"Workforce", nap:false, mode:"Two-peak", am_ce:10.25, am_wd:2.2, am_amp:0.75, pm_ce:18, pm_wd:2.3, pm_amp:0.735, dip_ce:14, dip_wd:1.2, dip_amp:0.105, msf_ce:2.75 },
  { no:12, band:"40–44", social:"Workforce", nap:false, mode:"Two-peak", am_ce:10, am_wd:2.2, am_amp:0.735, pm_ce:17.75, pm_wd:2.3, pm_amp:0.735, dip_ce:13.75, dip_wd:1.2, dip_amp:0.1, msf_ce:2.5 },
  { no:13, band:"45–49", social:"Workforce", nap:false, mode:"Two-peak", am_ce:10, am_wd:2.2, am_amp:0.735, pm_ce:17.75, pm_wd:2.3, pm_amp:0.75, dip_ce:13.75, dip_wd:1.2, dip_amp:0.1, msf_ce:2.5 },
  { no:14, band:"50–55", social:"Workforce", nap:false, mode:"Two-peak", am_ce:9.75, am_wd:2.3, am_amp:0.735, pm_ce:17.5, pm_wd:2.3, pm_amp:0.75, dip_ce:13.5, dip_wd:1.2, dip_amp:0.1, msf_ce:2.25 },
  { no:15, band:"56–60", social:"Workforce", nap:false, mode:"Two-peak (earlier bias)", am_ce:9.5, am_wd:2.3, am_amp:0.735, pm_ce:17.25, pm_wd:2.3, pm_amp:0.735, dip_ce:13.25, dip_wd:1.1, dip_amp:0.09, msf_ce:2 },
  { no:16, band:"61–65", social:"Older workforce", nap:false, mode:"Two-peak (gentler)", am_ce:9.25, am_wd:2.3, am_amp:0.7125, pm_ce:17, pm_wd:2.3, pm_amp:0.7125, dip_ce:13, dip_wd:1.1, dip_amp:0.085, msf_ce:1.75 },
  { no:17, band:"66–70", social:"Retiring", nap:false, mode:"Two-peak (gentle)", am_ce:9, am_wd:2.3, am_amp:0.7125, pm_ce:16.75, pm_wd:2.3, pm_amp:0.7125, dip_ce:12.75, dip_wd:1.1, dip_amp:0.08, msf_ce:1.5 },
  { no:18, band:"70+", social:"Older adult", nap:false, mode:"Two-peak (gentle)", am_ce:8.75, am_wd:2.3, am_amp:0.69, pm_ce:16.5, pm_wd:2.3, pm_amp:0.69, dip_ce:12.5, dip_wd:1, dip_amp:0.075, msf_ce:1.25 },
];

const DEFAULTS = {
  e_0: 0.5, lt: 2.25, gn: 0.5, ce: 2.5,
  mild: 0.2, mild3: 0.2,
  w_ep_md: 0.333, w_ep_ad: 0.333, w_ep_em: 0.333,
};

// Bedtime freefall steepness by age — younger = sharper cliff (stronger melatonin onset)
const FREEFALL_STEEPNESS = [
  { maxAge: 4, steepness: 4.5 },
  { maxAge: 6, steepness: 4.0 },
  { maxAge: 9, steepness: 3.5 },
  { maxAge: 12, steepness: 3.0 },
  { maxAge: 15, steepness: 2.5 },
  { maxAge: 18, steepness: 2.0 },
];

const SCHOOL_TIMES = [
  { age:3, level:"N1", start:8.5, end:12 }, { age:4, level:"N2", start:8.5, end:12 },
  { age:5, level:"K1", start:8.5, end:12.5 }, { age:6, level:"K2", start:8.5, end:12.5 },
  { age:7, level:"P1", start:7.5, end:13.5 }, { age:8, level:"P2", start:7.5, end:13.5 },
  { age:9, level:"P3", start:7.5, end:13.5 }, { age:10, level:"P4", start:7.5, end:13.5 },
  { age:11, level:"P5", start:7.5, end:13.5 }, { age:12, level:"P6", start:7.5, end:13.5 },
  { age:13, level:"S1", start:7.5, end:14.5 }, { age:14, level:"S2", start:7.5, end:14.5 },
  { age:15, level:"S3", start:7.5, end:15 },
  { age:16, level:"JC1", start:7.75, end:16 }, { age:17, level:"JC2", start:7.75, end:16 },
  { age:18, level:"JC3", start:7.75, end:16 },
];

const PHASE_CAPS = [
  { ages:[3,4,5,6], s_sch:0, phi_floor:0, phi_cap:0 },
  { ages:[7,8,9], s_sch:0.8, phi_floor:-0.25, phi_cap:0.25 },
  { ages:[10,11,12], s_sch:0.8, phi_floor:-0.25, phi_cap:0.25 },
  { ages:[13,14,15], s_sch:0.7, phi_floor:-0.5, phi_cap:0.5 },
  { ages:[16,17,18], s_sch:0.6, phi_floor:-0.75, phi_cap:0.75 },
];

function getAgeBand(age) {
  if (age <= 2) return AGE_BANDS[0]; if (age <= 4) return AGE_BANDS[1];
  if (age <= 6) return AGE_BANDS[2]; if (age <= 9) return AGE_BANDS[3];
  if (age <= 12) return AGE_BANDS[4]; if (age <= 15) return AGE_BANDS[5];
  if (age <= 18) return AGE_BANDS[6]; if (age <= 24) return AGE_BANDS[7];
  if (age <= 29) return AGE_BANDS[8]; if (age <= 34) return AGE_BANDS[9];
  if (age <= 39) return AGE_BANDS[10]; if (age <= 44) return AGE_BANDS[11];
  if (age <= 49) return AGE_BANDS[12]; if (age <= 55) return AGE_BANDS[13];
  if (age <= 60) return AGE_BANDS[14]; if (age <= 65) return AGE_BANDS[15];
  if (age <= 70) return AGE_BANDS[16]; return AGE_BANDS[17];
}

function getSchoolInfo(age) { return SCHOOL_TIMES.find(s => s.age === age) || null; }
function getSchoolInfoByLevel(level) { return SCHOOL_TIMES.find(s => s.level === level) || null; }
function getPhaseCap(age) { return PHASE_CAPS.find(p => p.ages.includes(age)) || { s_sch:0, phi_floor:0, phi_cap:0 }; }

// Get valid school levels for a given age — default + adjacent levels
// A 6yr old could be K2 (default) or P1 (entered early)
// A 7yr old could be P1 (default) or K2 (late start, rare but valid)
function getValidLevelsForAge(age) {
  const defaultSchool = getSchoolInfo(age);
  if (!defaultSchool) return [];
  const allLevels = SCHOOL_TIMES.map(s => s.level);
  const defaultIdx = SCHOOL_TIMES.findIndex(s => s.age === age);
  const levels = [{ level: defaultSchool.level, isDefault: true }];
  // Allow one level above (entered early) and one below (entered late)
  if (defaultIdx > 0) levels.unshift({ level: SCHOOL_TIMES[defaultIdx - 1].level, isDefault: false });
  if (defaultIdx < SCHOOL_TIMES.length - 1) levels.push({ level: SCHOOL_TIMES[defaultIdx + 1].level, isDefault: false });
  return levels;
}
function getFreefallSteepness(age) { return (FREEFALL_STEEPNESS.find(f => age <= f.maxAge) || { steepness: 2.0 }).steepness; }

// Core math
function d24(t, mu) { const diff = Math.abs(t - mu); return Math.min(diff, 24 - diff); }
function wave(t, amp, mu, phi, sigma) {
  if (sigma === 0) return 0;
  const dist = d24(t, mu + phi);
  return amp * Math.exp(-(dist * dist) / (2 * sigma * sigma));
}

// Bedtime freefall sigmoid — models melatonin onset cliff in children
// Returns 1.0 during the day, drops sharply to 0.0 near bedtime
// onset = bedtime - 1.75h (DLMO typically 1.5-2h before habitual bedtime)
function freefall(t, onset, steepness) {
  return 1 / (1 + Math.exp(steepness * (t - onset)));
}

function calculateMSF(freeSleep, freeWake) {
  let s = freeSleep, w = freeWake;
  if (s > w) return ((s + (w + 24)) / 2) % 24;
  return (s + w) / 2;
}

function calculatePhiChrono(msf_sc, msf_ce) {
  return DEFAULTS.lt * Math.tanh(DEFAULTS.gn * (msf_sc - msf_ce));
}

function calculateAdultAmplitudes(ageBand, likert) {
  const avg = (ageBand.am_amp + ageBand.pm_amp) / 2;
  const si = (likert - 3) / 2;
  return {
    amp1: ageBand.am_amp - avg * DEFAULTS.mild * si,
    amp2: ageBand.pm_amp + avg * DEFAULTS.mild * si,
    amp3: ageBand.dip_amp * (1 - DEFAULTS.mild3 * si),
  };
}

function calculateChildAmplitudes(ageBand) {
  return { amp1: ageBand.am_amp, amp2: ageBand.pm_amp, amp3: ageBand.dip_amp };
}

function calculateChildPhase(age, schStart, energySignals, schoolLevel) {
  const cap = getPhaseCap(age);
  // Use overridden school level for schedule reference, fall back to age default
  const school = schoolLevel ? getSchoolInfoByLevel(schoolLevel) : getSchoolInfo(age);
  if (!school || cap.phi_cap === 0) return 0;
  const schDev = Math.max(-2, Math.min(2, schStart - school.start));
  const phiSch = cap.s_sch * schDev;
  let phiEp = 0;
  if (age >= 13 && energySignals) {
    const fL = (x) => (x - 3) / 2;
    phiEp = DEFAULTS.w_ep_md * fL(energySignals.wakeDifficulty || 3)
           - DEFAULTS.w_ep_ad * fL(energySignals.afternoonFatigue || 3)
           - DEFAULTS.w_ep_em * fL(energySignals.eveningFluctuation || 3);
    phiEp *= (age <= 15 ? 0.4 : 0.6);
  }
  return Math.max(cap.phi_floor, Math.min(cap.phi_cap, phiSch + phiEp));
}

// Generate energy curve — supports optional bedtime freefall for children
function generateCurve(params) {
  const { ageBand, phi, amps, weekNudge, freefallConfig } = params;
  const pw = phi + (weekNudge?.phiDelta || 0);
  const a1 = amps.amp1 * (1 + (weekNudge?.amp1Delta || 0));
  const a2 = amps.amp2 * (1 + (weekNudge?.amp2Delta || 0));
  const a3 = amps.amp3 * (1 + (weekNudge?.amp3Delta || 0));

  const hasFF = freefallConfig && freefallConfig.onset > 0;

  const points = [];
  for (let t = 0; t <= 24; t += 0.25) {
    const waves = wave(t, a1, ageBand.am_ce, pw, ageBand.am_wd)
                + wave(t, a2, ageBand.pm_ce, pw, ageBand.pm_wd)
                - wave(t, a3, ageBand.dip_ce, pw, ageBand.dip_wd);

    let e;
    if (hasFF) {
      // Child curve: freefall multiplies the wave component, baseline stays
      const ff = freefall(t, freefallConfig.onset, freefallConfig.steepness);
      e = DEFAULTS.e_0 + waves * ff;
    } else {
      e = DEFAULTS.e_0 + waves;
    }
    points.push({ t, e });
  }

  let amPeak = { t: 0, e: 0 }, pmPeak = { t: 0, e: 0 }, dip = { t: 12, e: 2 };
  points.forEach(p => {
    if (p.t >= 6 && p.t <= 13 && p.e > amPeak.e) amPeak = { ...p };
    if (p.t >= 14 && p.t <= 22 && p.e > pmPeak.e) pmPeak = { ...p };
    if (p.t >= 11 && p.t <= 16 && p.e < dip.e) dip = { ...p };
  });

  // For child curves with freefall, also detect the freefall onset point
  let freefallPoint = null;
  if (hasFF) {
    // Find where energy drops below 75% of PM peak
    const threshold = DEFAULTS.e_0 + (pmPeak.e - DEFAULTS.e_0) * 0.4;
    for (let i = 0; i < points.length; i++) {
      if (points[i].t > pmPeak.t && points[i].e <= threshold) {
        freefallPoint = { t: points[i].t, e: points[i].e };
        break;
      }
    }
  }

  return { points, amPeak, pmPeak, dip, freefallPoint, phi_week: pw, amp1: a1, amp2: a2, amp3: a3 };
}

// Drummer recommendation score
function getDrummerScore(child) {
  const school = child.schoolLevel ? getSchoolInfoByLevel(child.schoolLevel) : getSchoolInfo(child.age);
  if (!school) return { score: 0, reason: "No school schedule data" };
  const startRigidity = Math.max(0, 9 - school.start);
  const durationRigidity = (school.end - school.start) / 8;
  const ageWeight = Math.max(0, (19 - child.age) / 16);
  const score = startRigidity * 0.4 + durationRigidity * 0.3 + ageWeight * 0.3;
  const reasons = [];
  if (school.start <= 7.5) reasons.push("early school start");
  if (child.age <= 9) reasons.push("younger child needs more structure");
  if (school.end - school.start >= 6) reasons.push("long school day");
  return { score, reason: reasons.join(", ") || "standard schedule" };
}

// ============================================================
// WEEKLY NUDGE ENGINE
// ============================================================

// Compute nudge deltas from a week's check-in data
// Check-in: { days: [{ wake, sleep, amRating, pmRating, dipRating, note }] }
// Returns: { phiDelta, amp1Delta, amp2Delta, amp3Delta }
function computeNudge(checkin, baseCurve) {
  if (!checkin || !checkin.days || checkin.days.length === 0) return null;
  const days = checkin.days.filter(d => d.wake || d.sleep || d.amRating || d.pmRating);
  if (days.length === 0) return null;

  // Phase nudge: consistent earlier/later wake shifts phi
  const wakes = days.filter(d => d.wake).map(d => d.wake);
  let phiDelta = 0;
  if (wakes.length >= 3) {
    const avgWake = wakes.reduce((a, b) => a + b, 0) / wakes.length;
    // Compare to predicted wake region (proxy: 2h before AM peak)
    const expectedWake = baseCurve.amPeak.t - 2;
    const wakeDrift = avgWake - expectedWake;
    // Small nudge: 15% of drift applied as phase shift, capped at ±0.3h
    phiDelta = Math.max(-0.3, Math.min(0.3, wakeDrift * 0.15));
  }

  // Amplitude nudge: energy ratings at peak/dip times adjust amplitudes
  const amRatings = days.filter(d => d.amRating).map(d => d.amRating);
  const pmRatings = days.filter(d => d.pmRating).map(d => d.pmRating);
  const dipRatings = days.filter(d => d.dipRating).map(d => d.dipRating);

  let amp1Delta = 0, amp2Delta = 0, amp3Delta = 0;

  if (amRatings.length >= 2) {
    const avgAm = amRatings.reduce((a, b) => a + b, 0) / amRatings.length;
    // Rating 3 = as expected, <3 = lower than predicted, >3 = higher
    amp1Delta = (avgAm - 3) * 0.04; // ±4% per point deviation
  }
  if (pmRatings.length >= 2) {
    const avgPm = pmRatings.reduce((a, b) => a + b, 0) / pmRatings.length;
    amp2Delta = (avgPm - 3) * 0.04;
  }
  if (dipRatings.length >= 2) {
    const avgDip = dipRatings.reduce((a, b) => a + b, 0) / dipRatings.length;
    // Higher dip rating = more tired = deeper dip (increase amp3)
    amp3Delta = (avgDip - 3) * 0.04;
  }

  return { phiDelta, amp1Delta, amp2Delta, amp3Delta };
}

// Accumulate nudges across weeks (each week's nudge stacks on previous)
function accumulateNudges(weeklyNudges) {
  const result = { phiDelta: 0, amp1Delta: 0, amp2Delta: 0, amp3Delta: 0 };
  weeklyNudges.forEach(n => {
    if (n) {
      result.phiDelta += n.phiDelta;
      result.amp1Delta += n.amp1Delta;
      result.amp2Delta += n.amp2Delta;
      result.amp3Delta += n.amp3Delta;
    }
  });
  // Cap accumulated nudges
  result.phiDelta = Math.max(-0.75, Math.min(0.75, result.phiDelta));
  result.amp1Delta = Math.max(-0.15, Math.min(0.15, result.amp1Delta));
  result.amp2Delta = Math.max(-0.15, Math.min(0.15, result.amp2Delta));
  result.amp3Delta = Math.max(-0.15, Math.min(0.15, result.amp3Delta));
  return result;
}

// Compute child nudge from parent-reported pulse
// pulse: { bedtimeActual, morningDifficulty(1-5), eveningMeltdowns(1-5) }
// Child nudges are 50% of adult rate — biology is more parameter-driven
// Two distinct adjustments:
//   bedtimeShift: the child actually slept earlier/later (moves baseline)
//   onsetGapAdjust: meltdowns suggest the 1.75h gap needs tuning
function computeChildNudge(pulse, child) {
  if (!pulse) return null;
  let phiDelta = 0, bedtimeShift = 0, onsetGapAdjust = 0;

  // Bedtime drift: direct observation of actual vs planned bedtime
  if (pulse.bedtimeActual != null && pulse.bedtimeActual !== child.bedtime) {
    bedtimeShift = pulse.bedtimeActual - child.bedtime;
  }

  // Morning difficulty: higher than baseline (3) → slight phase-later nudge
  if (pulse.morningDifficulty) {
    phiDelta = (pulse.morningDifficulty - 3) * 0.02; // 50% of adult rate
  }

  // Evening meltdowns: adjusts the onset gap independently of bedtime
  // More meltdowns → freefall is hitting later than reality → shrink the gap
  // Fewer meltdowns → gap could be wider (child handles evenings well)
  if (pulse.eveningMeltdowns) {
    onsetGapAdjust = (pulse.eveningMeltdowns - 3) * 0.1; // each point = ±6min gap change
  }

  return { phiDelta, bedtimeShift, onsetGapAdjust };
}

function accumulateChildNudges(weeklyNudges) {
  const result = { phiDelta: 0, bedtimeShift: 0, onsetGapAdjust: 0 };
  weeklyNudges.forEach(n => {
    if (n) {
      result.phiDelta += n.phiDelta;
      result.bedtimeShift += n.bedtimeShift;
      result.onsetGapAdjust += n.onsetGapAdjust;
    }
  });
  result.phiDelta = Math.max(-0.5, Math.min(0.5, result.phiDelta));
  result.bedtimeShift = Math.max(-1, Math.min(1, result.bedtimeShift));
  result.onsetGapAdjust = Math.max(-0.5, Math.min(0.5, result.onsetGapAdjust));
  return result;
}

// ============================================================
// ICS CALENDAR EXPORT
// ============================================================

function generateICS(curve, personName, weekStartDate, isChild) {
  const pad2 = n => String(n).padStart(2, "0");

  function makeDate(dayOffset, hours) {
    const d = new Date(weekStartDate);
    d.setDate(d.getDate() + dayOffset);
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    d.setHours(h, m, 0, 0);
    return d;
  }

  function formatDT(d) {
    return `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}T${pad2(d.getHours())}${pad2(d.getMinutes())}00`;
  }

  const events = [];
  const now = new Date();
  const stamp = formatDT(now);

  // Adult peaks: 90min block (30min before peak, 60min after)
  // Adult dip: 45min block (15min before dip, 30min after)
  // Child peaks: 60min block (30min before, 30min after)
  // Child dip: 60min block (30min before, 30min after)

  for (let day = 0; day < 7; day++) {
    // AM Peak
    events.push({
      summary: `⚡ AM Peak — ${personName}`,
      start: makeDate(day, isChild ? curve.amPeak.t - 0.5 : curve.amPeak.t - 0.5),
      end:   makeDate(day, isChild ? curve.amPeak.t + 0.5 : curve.amPeak.t + 1),
      desc: isChild
        ? `Morning energy peak. Good window for focused activities.`
        : `Your morning energy peak. Best time for deep, creative work. Protect this window.`,
    });

    // Dip
    events.push({
      summary: `💤 Energy Dip — ${personName}`,
      start: makeDate(day, isChild ? curve.dip.t - 0.5 : curve.dip.t - 0.25),
      end:   makeDate(day, isChild ? curve.dip.t + 0.5 : curve.dip.t + 0.5),
      desc: isChild
        ? `Afternoon dip. Low-energy period — lighter tasks or quiet time.`
        : `Afternoon dip. Step away from demanding work. Good for a walk, light tasks, or a short rest.`,
    });

    // PM Peak
    events.push({
      summary: `🔥 PM Peak — ${personName}`,
      start: makeDate(day, isChild ? curve.pmPeak.t - 0.5 : curve.pmPeak.t - 0.5),
      end:   makeDate(day, isChild ? curve.pmPeak.t + 0.5 : curve.pmPeak.t + 1),
      desc: isChild
        ? `Evening energy peak. Active play or homework window.`
        : `Your evening energy peak. Great for exercise, collaborative work, or active tasks.`,
    });

    // Freefall — children only, 30min wind-down window
    if (curve.freefallPoint) {
      events.push({
        summary: `🌙 Wind-down — ${personName}`,
        start: makeDate(day, curve.freefallPoint.t),
        end: makeDate(day, curve.freefallPoint.t + 0.5),
        desc: `Energy cliff begins. Start the wind-down routine — bath, stories, quiet time.`,
      });
    }
  }

  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Curve//PoC//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n`;

  events.forEach((ev, i) => {
    ics += `BEGIN:VEVENT\r\n`;
    ics += `UID:curve-${stamp}-${i}@aegiso.io\r\n`;
    ics += `DTSTAMP:${stamp}\r\n`;
    ics += `DTSTART:${formatDT(ev.start)}\r\n`;
    ics += `DTEND:${formatDT(ev.end)}\r\n`;
    ics += `SUMMARY:${ev.summary}\r\n`;
    ics += `DESCRIPTION:${ev.desc}\r\n`;
    ics += `END:VEVENT\r\n`;
  });

  ics += `END:VCALENDAR\r\n`;
  return ics;
}

function downloadICS(icsContent, filename) {
  const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function formatTime(h) {
  const hh = ((h % 24) + 24) % 24;
  const hours = Math.floor(hh);
  const mins = Math.round((hh - hours) * 60);
  const period = hours >= 12 ? "pm" : "am";
  const dh = hours === 0 ? 12 : hours > 12 ? hours - 12 : hours;
  return mins === 0 ? `${dh}${period}` : `${dh}:${String(mins).padStart(2,"0")}${period}`;
}

function CurveChart({ curves, width=700, height=320, showLabels=true, focusIndex=0 }) {
  const pad = { top:30, right:30, bottom:40, left:50 };
  const cW = width - pad.left - pad.right;
  const cH = height - pad.top - pad.bottom;

  let yMin = 0.2, yMax = 1.3;
  curves.forEach(c => c.curve.points.forEach(p => { if (p.e < yMin) yMin = p.e; if (p.e > yMax) yMax = p.e; }));
  yMin = Math.floor(yMin * 10) / 10 - 0.05;
  yMax = Math.ceil(yMax * 10) / 10 + 0.05;

  // X-axis: 4am to 4am (next day) = hours 4 to 28
  const xMin = 4, xMax = 28;
  const xS = (t) => {
    const nt = t < xMin ? t + 24 : t; // wrap times before 4am to next day
    return pad.left + ((nt - xMin) / (xMax - xMin)) * cW;
  };
  const yS = (e) => pad.top + cH - ((e - yMin) / (yMax - yMin)) * cH;

  const pathD = (pts) => {
    // Reorder points so they start from 4am
    const sorted = pts.map(p => ({ ...p, nt: p.t < xMin ? p.t + 24 : p.t })).sort((a, b) => a.nt - b.nt);
    return sorted.map((p, i) => `${i === 0 ? "M" : "L"} ${xS(p.nt)} ${yS(p.e)}`).join(" ");
  };
  const areaD = (pts) => {
    const sorted = pts.map(p => ({ ...p, nt: p.t < xMin ? p.t + 24 : p.t })).sort((a, b) => a.nt - b.nt);
    const line = sorted.map((p, i) => `${i === 0 ? "M" : "L"} ${xS(p.nt)} ${yS(p.e)}`).join(" ");
    return `${line} L ${xS(sorted[sorted.length-1].nt)} ${yS(yMin)} L ${xS(sorted[0].nt)} ${yS(yMin)} Z`;
  };

  const hours = [4,6,9,12,15,18,21,24,27];
  const hLabels = ["4am","6am","9am","12pm","3pm","6pm","9pm","12am","3am"];

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow:"visible" }}>
      <defs>
        {curves.map((c, i) => (
          <linearGradient key={i} id={`cg-${i}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={c.color} stopOpacity={i === focusIndex ? 0.25 : 0.1} />
            <stop offset="100%" stopColor={c.color} stopOpacity="0.02" />
          </linearGradient>
        ))}
      </defs>

      {hours.map((h, i) => (
        <line key={i} x1={xS(h)} y1={pad.top} x2={xS(h)} y2={pad.top + cH}
          stroke={C.border} strokeWidth="1" strokeDasharray={h % 6 === 0 ? "none" : "3,3"} opacity={h % 6 === 0 ? 0.5 : 0.25} />
      ))}
      <rect x={xS(4)} y={pad.top} width={xS(6)-xS(4)} height={cH} fill={C.accent} opacity="0.04" />
      <rect x={xS(22)} y={pad.top} width={xS(28)-xS(22)} height={cH} fill={C.accent} opacity="0.04" />

      {curves.map((c, i) => <path key={`a${i}`} d={areaD(c.curve.points)} fill={`url(#cg-${i})`} />)}
      {curves.map((c, i) => (
        <path key={`l${i}`} d={pathD(c.curve.points)} fill="none" stroke={c.color}
          strokeWidth={i === focusIndex ? 2.5 : 1.5} strokeLinecap="round" strokeLinejoin="round"
          opacity={i === focusIndex ? 1 : 0.55} strokeDasharray={c.isDrummer ? "6,3" : "none"} />
      ))}

      {/* Freefall zone — soft gradient instead of precise marker */}
      {showLabels && curves[focusIndex]?.curve?.freefallPoint && (() => {
        const fp = curves[focusIndex].curve.freefallPoint;
        const zoneStart = fp.t - 0.25;
        const zoneEnd = fp.t + 0.75;
        return (
          <g>
            <rect x={xS(zoneStart)} y={pad.top} width={xS(zoneEnd) - xS(zoneStart)} height={cH}
              fill={C.red} opacity="0.08" rx="4" />
            <text x={xS(fp.t + 0.25)} y={pad.top + 16} fill={C.red} fontSize="10" fontFamily={fS} fontWeight="600" opacity="0.7" textAnchor="middle">
              freefall zone
            </text>
          </g>
        );
      })()}

      {showLabels && curves[focusIndex] && (() => {
        const { amPeak, pmPeak, dip } = curves[focusIndex].curve;
        return (
          <g>
            <circle cx={xS(amPeak.t)} cy={yS(amPeak.e)} r={8} fill={C.energy} opacity="0.85" />
            <text x={xS(amPeak.t)} y={yS(amPeak.e)-14} textAnchor="middle" fill={C.energy} fontSize="11" fontFamily={fS} fontWeight="600">AM ~{formatTime(amPeak.t)}</text>
            <circle cx={xS(pmPeak.t)} cy={yS(pmPeak.e)} r={8} fill={C.warm} opacity="0.85" />
            <text x={xS(pmPeak.t)} y={yS(pmPeak.e)-14} textAnchor="middle" fill={C.warm} fontSize="11" fontFamily={fS} fontWeight="600">PM ~{formatTime(pmPeak.t)}</text>
            <circle cx={xS(dip.t)} cy={yS(dip.e)} r={7} fill={C.dip} opacity="0.85" />
            <text x={xS(dip.t)} y={yS(dip.e)+22} textAnchor="middle" fill={C.dip} fontSize="11" fontFamily={fS} fontWeight="600">Dip ~{formatTime(dip.t)}</text>
          </g>
        );
      })()}

      {curves.length > 1 && curves.map((c, i) => (
        <g key={`leg${i}`} transform={`translate(${pad.left + i * 120}, ${pad.top - 16})`}>
          <line x1="0" y1="0" x2="16" y2="0" stroke={c.color} strokeWidth="2" strokeDasharray={c.isDrummer ? "4,2" : "none"} />
          <text x="22" y="4" fill={c.color} fontSize="11" fontFamily={fS} fontWeight="500">{c.label}{c.isDrummer ? " ♩" : ""}</text>
        </g>
      ))}

      {hours.map((h, i) => (
        <text key={`xl${i}`} x={xS(h)} y={pad.top + cH + 24} textAnchor="middle" fill={C.textDim} fontSize="11" fontFamily={fS}>{hLabels[i]}</text>
      ))}
      <text x={pad.left - 36} y={pad.top + cH / 2} textAnchor="middle" fill={C.textDim} fontSize="11" fontFamily={fS}
        transform={`rotate(-90, ${pad.left - 36}, ${pad.top + cH / 2})`}>Energy</text>
    </svg>
  );
}

function StepChildren({ children, onUpdate, onNext, onBack }) {
  const addChild = () => {
    if (children.length >= 2) return;
    const defaultSchool = getSchoolInfo(7);
    onUpdate([...children, { id:Date.now(), nickname:"", age:7,
      schoolLevel: defaultSchool.level, schStart:defaultSchool.start, schEnd:defaultSchool.end,
      bedtime:21.5, wakeTime:defaultSchool.start - 1, napping:"No",
      wakeDifficulty:3, afternoonFatigue:3, eveningFluctuation:3 }]);
  };
  const updateChild = (idx, updates) => {
    const next = [...children];
    next[idx] = { ...next[idx], ...updates };
    // When age changes: reset school level to default for new age, update times
    if (updates.age !== undefined) {
      const si = getSchoolInfo(updates.age);
      if (si) {
        next[idx].schoolLevel = si.level;
        next[idx].schStart = si.start;
        next[idx].schEnd = si.end;
        next[idx].wakeTime = si.start - 1;
      }
    }
    // When school level is overridden: update constraint times from new level
    if (updates.schoolLevel !== undefined) {
      const si = getSchoolInfoByLevel(updates.schoolLevel);
      if (si) {
        next[idx].schStart = si.start;
        next[idx].schEnd = si.end;
        next[idx].wakeTime = si.start - 1;
      }
    }
    onUpdate(next);
  };
  const removeChild = (idx) => onUpdate(children.filter((_, i) => i !== idx));

  return (
    <div style={{ padding:"24px 20px" }}>
      <StepHeader step={2} total={3} title="Your Children" subtitle="Up to 2 children" />
      {children.map((child, idx) => (
        <div key={child.id} style={{ background:C.surface, borderRadius:14, padding:20, border:`1px solid ${C.border}`, marginBottom:16 }}>

              <span style={{ color:C.text, fontSize:14, fontWeight:600, fontFamily:fS }}>Child {idx+1}</span>
            </div>
            <button onClick={() => removeChild(idx)} style={{ background:"none", border:"none", color:C.textDim, cursor:"pointer", fontSize:18 }}>×</button>
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ ...labelSt, fontSize:13 }}>Nickname</label>
            <input type="text" value={child.nickname} onChange={e => updateChild(idx, { nickname:e.target.value })}
              placeholder="Child's name" style={{ ...inputSt, fontSize:14 }} />
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ ...labelSt, fontSize:13 }}>Age this year</label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {Array.from({ length:16 }, (_, i) => i+3).map(a => (
                <button key={a} onClick={() => updateChild(idx, { age:a })} style={{
                  ...chipSt, padding:"8px 10px", fontSize:12, minWidth:36,
                  ...(child.age === a ? chipAct : {}),
                }}>{a}</button>
              ))}
            </div>
          </div>
          {getSchoolInfo(child.age) && (() => {
            const validLevels = getValidLevelsForAge(child.age);
            const currentSchool = getSchoolInfoByLevel(child.schoolLevel);
            const isOverridden = validLevels.length > 0 && !validLevels.find(v => v.level === child.schoolLevel && v.isDefault);
            return (
              <div style={{ marginBottom:16 }}>
                <label style={{ ...labelSt, fontSize:13 }}>School level</label>
                <div style={{ display:"flex", gap:6, marginBottom:8 }}>
                  {validLevels.map(v => (
                    <button key={v.level} onClick={() => updateChild(idx, { schoolLevel:v.level })} style={{
                      ...chipSt, padding:"8px 14px", fontSize:12,
                      ...(child.schoolLevel === v.level ? chipAct : {}),
                    }}>
                      {v.level}{v.isDefault ? "" : ""}
                    </button>
                  ))}
                </div>
                <div style={{ background: isOverridden ? C.warmDim : C.accentSoft, borderRadius:10, padding:"10px 14px", border:`1px solid ${C.border}` }}>
                  <span style={{ color: isOverridden ? C.warm : C.accent, fontSize:12, fontFamily:fS }}>

  );

const AGE_MAP = { "19–24":21,"25–29":27,"30–34":32,"35–39":37,"40–44":42,"45–49":47,"50–55":52,"56–60":58,"61–65":63,"66–70":68,"70+":72 };

function computeAdultCurve(profile) {
  const ageBand = getAgeBand(AGE_MAP[profile.ageRange] || 32);
  const msf = calculateMSF(profile.freeSleep, profile.freeWake);
  const phi = calculatePhiChrono(msf, ageBand.msf_ce);
  const amps = calculateAdultAmplitudes(ageBand, profile.likert);
  const curve = generateCurve({ ageBand, phi, amps, weekNudge:null, freefallConfig:null });
  return { ageBand, msf, phi, amps, curve };
}

function computeChildCurve(child) {
  const ageBand = getAgeBand(child.age);
  const amps = calculateChildAmplitudes(ageBand);
  const phi = calculateChildPhase(child.age, child.schStart, {
    wakeDifficulty: child.wakeDifficulty,
    afternoonFatigue: child.afternoonFatigue,
    eveningFluctuation: child.eveningFluctuation,
  }, child.schoolLevel);

  // Bedtime freefall: onset = bedtime - 1.75h, steepness by age
  const freefallConfig = {
    onset: child.bedtime - 1.75,
    steepness: getFreefallSteepness(child.age),
  };

  const curve = generateCurve({ ageBand, phi, amps, weekNudge:null, freefallConfig });
  return { ageBand, phi, amps, curve, freefallConfig };
}

                  <div style={{ position:"absolute", left:`${((pulse.bedtimeActual - 19) / 4) * 100}%`, transform:"translateX(-50%)",

              <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS, display:"block", marginBottom:8 }}>
                Evening meltdowns or mood crashes?

                {[{n:1,l:"None"},{n:2,l:"Rare"},{n:3,l:"Normal"},{n:4,l:"More than usual"},{n:5,l:"Every night"}].map(({n,l}) => (
                  <button key={n} onClick={() => updatePulse(child.id, { eveningMeltdowns: n })} style={{
                    flex:1, padding:"8px 2px", borderRadius:8, fontSize:10, fontWeight:600, fontFamily:fS, cursor:"pointer",
                    border:`1.5px solid ${pulse.eveningMeltdowns===n ? C.red : C.border}`,

                    color:pulse.eveningMeltdowns===n ? C.red : C.textDim, lineHeight:1.3,

      })}

      <NavButtons onBack={onBack} onNext={() => onSave(pulses)} nextLabel="Save & Generate Next Week" />
    </div>
  );
}

function FamilyInsights({ curves, drummer }) {
  const dc = curves.find(c => c.id === drummer);
  if (!dc) return null;

  const adultCurves = curves.filter(c => !c.curve.freefallPoint);
  const childCurves = curves.filter(c => c.curve.freefallPoint);

  const amP = curves.map(c => c.curve.amPeak.t), pmP = curves.map(c => c.curve.pmPeak.t);
  const amS = Math.max(...amP) - Math.min(...amP);
  const pmS = Math.max(...pmP) - Math.min(...pmP);

  const ins = [];

  // Morning alignment
  if (amS < 1) {
    ins.push({ icon:"✦", color:C.energy,
      text:`Morning peaks land within ${amS < 0.5 ? "half" : "one"} hour of each other. This is your family's power window. Protect it for the one thing that matters most this week.`
    });
  } else if (amS > 2) {
    ins.push({ icon:"☀️", color:C.warm,
      text:`Morning peaks are ${amS.toFixed(1)}h apart. Each member has their own high-energy window before the day crowds in. Use yours for what matters most to you.`
    });
  }

  // Evening alignment
  if (pmS < 1) {
    ins.push({ icon:"✦", color:C.energy,
      text:`Evening peaks are close. You can sync dinner, play, and wind-down naturally without anyone dragging or rushing.`
    });
  } else if (pmS > 2) {
    ins.push({ icon:"🔋", color:C.warm,
      text:`Evening peaks spread across ${pmS.toFixed(1)}h. Save some fuel for the other side of your day. If you burn your peak at work, you'll meet your family running on empty.`
    });
  }

  // Freefall collision → planning gift
  childCurves.forEach(child => {
    const ft = child.curve.freefallPoint.t;
    adultCurves.forEach(adult => {
      const ae = adult.curve.points.find(p => Math.abs(p.t - ft) < 0.25);
      if (ae && ae.e > 0.85) {
        ins.push({ icon:"🎁", color:C.pink,
          text:`${child.label}'s freefall around ${formatTime(ft)} lands while ${adult.label} still has high energy. This is actually your planning gift: you know roughly when the cliff hits. Work backward. Dinner before freefall, not during. Your remaining energy becomes the wind-down resource.`
        });
      }
    });
  });

  // Peak-freefall golden window
  childCurves.forEach(child => {
    if (!child.curve.freefallPoint) return;
    const ft = child.curve.freefallPoint.t;
    adultCurves.forEach(adult => {
      const gap = ft - adult.curve.pmPeak.t;
      if (gap > 0.25 && gap < 3) {
        const gapMins = Math.round(gap * 60);
        ins.push({ icon:"✨", color:C.energy,
          text:`There are ${gapMins} minutes between ${adult.label}'s PM peak and ${child.label}'s freefall. This is your golden window for quality family time. Guard it.`
        });
      }
    });
  });

  // Dip overlap
  childCurves.forEach(child => {
    adultCurves.forEach(adult => {
      const dipGap = Math.abs(adult.curve.dip.t - child.curve.dip.t);
      if (dipGap < 1) {
        ins.push({ icon:"💤", color:C.dip,
          text:`${adult.label} and ${child.label} both dip around the same time. Don't fight it. This is a shared rest window. Lean in together.`
        });
      }
    });
  });

  // Drummer anchor
  ins.push({ icon:"♩", color:C.amber,
    text:`${dc.label}'s schedule is the heartbeat of your household. Once you stop fighting it and build around it, everything else gets easier.`
  });

  return (
    <div style={{ marginBottom:16 }}>
      <h4 style={{ ...secTitle, margin:"0 0 10px", fontSize:11 }}>Family Rhythm Insights</h4>
      {ins.map((x, i) => (
        <div key={i} style={{ background:C.surface, borderRadius:10, padding:"12px 16px", marginBottom:6, border:`1px solid ${C.border}`, display:"flex", gap:10, alignItems:"flex-start" }}>
          <span style={{ fontSize:18, flexShrink:0 }}>{x.icon}</span>
          <span style={{ color:C.textMuted, fontSize:14, fontFamily:fS, lineHeight:1.6 }}>{x.text}</span>
        </div>
      ))}
    </div>
  );
}

// UNIFIED DASHBOARD WITH WEEKS
// ============================================================

function DashboardWithWeeks({ profile, partner, children, drummer, onReset }) {
  const isFamily = profile.mode === "family";
  const [currentWeek, setCurrentWeek] = useState(1);
  const [viewWeek, setViewWeek] = useState(1);
  const [view, setView] = useState(isFamily ? "family" : "individual");
  const [focusMember, setFocusMember] = useState("self");
  const [showCheckin, setShowCheckin] = useState(false);
  const [showChildPulse, setShowChildPulse] = useState(false);
  const [showCelebration, setShowCelebration] = useState(false);
  const [checkinTarget, setCheckinTarget] = useState(null);
  const [weeklyData, setWeeklyData] = useState({});
  const [showComparison, setShowComparison] = useState(false);
  const [deliveryEmail, setDeliveryEmail] = useState("");
  const [deliveryStatus, setDeliveryStatus] = useState("idle"); // idle | confirming | sent

  const computeAllCurves = useCallback((week) => {
    const getNudge = (mid, baseCurve) => {
      const md = weeklyData[mid] || {};
      const nudges = [];
      for (let w = 1; w < week; w++) { if (md[w]) nudges.push(computeNudge(md[w], baseCurve)); }
      return accumulateNudges(nudges);
    };
    const sB = getAgeBand(AGE_MAP[profile.ageRange]||32);
    const sM = calculateMSF(profile.freeSleep, profile.freeWake);
    const sP = calculatePhiChrono(sM, sB.msf_ce);
    const sA = calculateAdultAmplitudes(sB, profile.likert);
    const sBase = generateCurve({ageBand:sB,phi:sP,amps:sA,weekNudge:null,freefallConfig:null});
    const sN = getNudge("self", sBase);
    const sC = generateCurve({ageBand:sB,phi:sP,amps:sA,weekNudge:sN,freefallConfig:null});
    const curves = [{id:"self",label:profile.nickname,curve:sC,color:MEMBER_COLORS[0],isDrummer:false,nudge:sN}];
    if (isFamily && partner.nickname) {
      const pB = getAgeBand(AGE_MAP[partner.ageRange]||32);
      const pM = calculateMSF(partner.freeSleep,partner.freeWake);
      const pP = calculatePhiChrono(pM,pB.msf_ce);
      const pA = calculateAdultAmplitudes(pB,partner.likert);
      const pBase = generateCurve({ageBand:pB,phi:pP,amps:pA,weekNudge:null,freefallConfig:null});
      const pN = getNudge("partner",pBase);
      const pC = generateCurve({ageBand:pB,phi:pP,amps:pA,weekNudge:pN,freefallConfig:null});
      curves.push({id:"partner",label:partner.nickname,curve:pC,color:MEMBER_COLORS[1],isDrummer:false,nudge:pN});
    }
    if (isFamily) children.forEach((ch,i) => {
      const cB = getAgeBand(ch.age), cA = calculateChildAmplitudes(cB);
      const cP = calculateChildPhase(ch.age,ch.schStart,{wakeDifficulty:ch.wakeDifficulty,afternoonFatigue:ch.afternoonFatigue,eveningFluctuation:ch.eveningFluctuation},ch.schoolLevel);
      // Accumulate child pulse nudges
      const childPulses = [];
      for (let w = 1; w < week; w++) {
        const pulse = (weeklyData["childPulse"] || {})[w];
        if (pulse && pulse[ch.id]) childPulses.push(computeChildNudge(pulse[ch.id], ch));
      }
      const cNudge = accumulateChildNudges(childPulses);
      // Bedtime drift moves the baseline; onset gap adjusts the 1.75h window
      const adjustedBedtime = ch.bedtime + (cNudge.bedtimeShift || 0);
      const adjustedGap = 1.75 + (cNudge.onsetGapAdjust || 0); // more meltdowns = smaller gap (earlier onset)
      const ff = {onset: adjustedBedtime - adjustedGap, steepness:getFreefallSteepness(ch.age)};
      const weekNudge = cNudge.phiDelta !== 0 ? { phiDelta: cNudge.phiDelta, amp1Delta:0, amp2Delta:0, amp3Delta:0 } : null;
      const cC = generateCurve({ageBand:cB,phi:cP,amps:cA,weekNudge:weekNudge,freefallConfig:ff});
      const hasNudge = cNudge.phiDelta!==0 || cNudge.bedtimeShift!==0 || cNudge.onsetGapAdjust!==0;
      curves.push({id:ch.id,label:ch.nickname,curve:cC,color:MEMBER_COLORS[i+2],isDrummer:ch.id===drummer,
        nudge: hasNudge ? cNudge : null, adjustedBedtime, adjustedGap});
    });
    return curves;
  }, [profile,partner,children,drummer,weeklyData,isFamily]);

  const allCurves = useMemo(() => computeAllCurves(viewWeek), [computeAllCurves,viewWeek]);
  const prevCurves = useMemo(() => viewWeek > 1 ? computeAllCurves(viewWeek-1) : null, [computeAllCurves,viewWeek]);
  const displayCurves = useMemo(() => {
    let base = view==="individual" ? allCurves.filter(c=>c.id===focusMember) : allCurves;
    if (showComparison && prevCurves) {
      const pf = prevCurves.find(c=>c.id===focusMember);
      if (pf) base = [...base, {...pf,label:`${pf.label} (Wk ${viewWeek-1})`,color:C.textDim,isDrummer:false,isGhost:true}];
    }
    return base;
  }, [allCurves,prevCurves,view,focusMember,showComparison,viewWeek]);

  const focusIdx = displayCurves.findIndex(c=>c.id===focusMember&&!c.isGhost);
  const focusCurve = allCurves.find(c=>c.id===focusMember)||allCurves[0];
  const focusChild = children.find(c=>c.id===focusMember);
  const canCheckin = currentWeek <= 4;
  const hasCheckin = (weeklyData["self"]||{})[currentWeek];
  const isFirstReveal = currentWeek === 1 && !hasCheckin;

  const handleCheckinSave = (data) => {
    setWeeklyData(p => ({...p, self:{...(p.self||{}), [checkinTarget]:data}}));
    setShowCheckin(false);
    // If family with children, show child pulse next; otherwise show celebration
    if (isFamily && children.length > 0) {
      setShowChildPulse(true);
    } else {
      setShowCelebration(true);
    }
  };

  const handleChildPulseSave = (pulses) => {
    setWeeklyData(p => ({...p, childPulse:{...(p.childPulse||{}), [checkinTarget]:pulses}}));
    setShowChildPulse(false);
    setShowCelebration(true);
  };

  const handleCelebrationDone = () => {
    setShowCelebration(false);
    if (currentWeek < 4) { setCurrentWeek(p=>Math.min(4,p+1)); setViewWeek(p=>Math.min(4,p+1)); }
  };

  const handleDownloadICS = () => {
    const nm = new Date(); const dow = nm.getDay(); const dum = dow===0?1:8-dow;
    nm.setDate(nm.getDate()+dum);
    const isChild = !!children.find(c => c.id === focusMember);
    const ics = generateICS(focusCurve.curve, focusCurve.label, nm, isChild);
    downloadICS(ics, `curve-wk${viewWeek}-${focusCurve.label.toLowerCase().replace(/\s/g,"-")}.ics`);
  };

  // Build the full state snapshot for delivery signup
  const buildSnapshot = () => ({
    timestamp: new Date().toISOString(),
    email: deliveryEmail,
    currentWeek,
    profile: { nickname:profile.nickname, gender:profile.gender, ageRange:profile.ageRange,
      freeSleep:profile.freeSleep, freeWake:profile.freeWake, workSleep:profile.workSleep,
      workWake:profile.workWake, likert:profile.likert, mode:profile.mode },
    partner: partner.nickname ? { nickname:partner.nickname, gender:partner.gender, ageRange:partner.ageRange,
      freeSleep:partner.freeSleep, freeWake:partner.freeWake, workSleep:partner.workSleep,
      workWake:partner.workWake, likert:partner.likert } : null,
    children: children.map(c => ({ nickname:c.nickname, age:c.age, schoolLevel:c.schoolLevel,
      schStart:c.schStart, schEnd:c.schEnd, bedtime:c.bedtime, wakeTime:c.wakeTime,
      napping:c.napping, wakeDifficulty:c.wakeDifficulty, afternoonFatigue:c.afternoonFatigue,
      eveningFluctuation:c.eveningFluctuation })),
    drummer,
    weeklyCheckins: weeklyData,
  });

  const handleDeliverySubmit = async () => {
    if (!deliveryEmail || !deliveryEmail.includes("@")) return;
    setDeliveryStatus("confirming");
  };

  const handleDeliveryConfirm = async () => {
    const snapshot = buildSnapshot();
    // WEBHOOK_URL: replace with your actual endpoint (Formspree, Google Apps Script, etc.)
    const WEBHOOK_URL = "";
    if (WEBHOOK_URL) {
      try {
        await fetch(WEBHOOK_URL, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(snapshot),
        });
        setDeliveryStatus("sent");
      } catch (e) {
        // Fallback to clipboard
        try { await navigator.clipboard.writeText(JSON.stringify(snapshot, null, 2)); }
        catch (_) {}
        setDeliveryStatus("sent");
      }
    } else {
      // No webhook configured: copy to clipboard as fallback
      try { await navigator.clipboard.writeText(JSON.stringify(snapshot, null, 2)); }
      catch (_) {}
      setDeliveryStatus("sent");
    }
  };

  // The check-in always uses the primary user's curve, regardless of which member is focused
  const selfCurve = allCurves.find(c => c.id === "self") || allCurves[0];

  if (showCheckin) return (
    <WeeklyCheckin week={checkinTarget} personName={profile.nickname} predictedCurve={selfCurve.curve}
      checkin={(weeklyData["self"]||{})[checkinTarget]} onSave={handleCheckinSave} onBack={()=>setShowCheckin(false)} />
  );

  if (showChildPulse) return (
    <ChildPulseCheckin week={checkinTarget} children={children}
      pulseData={(weeklyData["childPulse"]||{})[checkinTarget]}
      onSave={handleChildPulseSave} onBack={()=>setShowChildPulse(false)} />
  );

  if (showCelebration) return (
    <div style={{ padding:"24px 20px" }}>
      {/* Celebration */}
      <div style={{ textAlign:"center", padding:"40px 0 24px" }}>
        <div style={{ width:72, height:72, borderRadius:20, margin:"0 auto 20px",
          background:`linear-gradient(135deg, ${C.energy}, ${C.accent})`, display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:32, boxShadow:`0 8px 32px ${C.accentGlow}` }}>✓</div>
        <h2 style={{ fontFamily:fD, fontSize:26, fontWeight:400, color:C.text, margin:"0 0 8px" }}>
          Week {checkinTarget} of 4 logged
        </h2>
        <div style={{ display:"flex", gap:4, justifyContent:"center", marginBottom:16 }}>
          {[1,2,3,4].map(w => (
            <div key={w} style={{ width:48, height:6, borderRadius:3,
              background: w <= checkinTarget ? C.accent : C.border,
              transition:"background 0.3s" }} />
          ))}
        </div>
        <p style={{ color:C.textMuted, fontSize:14, fontFamily:fS, margin:"0 0 4px", lineHeight:1.5 }}>
          {checkinTarget === 1 && "Quarter way there. Your curve is already getting personal."}
          {checkinTarget === 2 && "Halfway through. Your rhythm is coming into focus."}
          {checkinTarget === 3 && "Three down, one to go. Your curve is sharper than ever."}
          {checkinTarget === 4 && "All 4 weeks complete. You've mapped your full rhythm."}
        </p>
        <p style={{ color:C.textDim, fontSize:12, fontFamily:fS, margin:0 }}>
          Check in by Saturday → refined curve delivered Sunday morning for your week-ahead planning.
        </p>
      </div>

      {/* Email signup — the conversion moment */}
      {deliveryStatus === "idle" && (
        <div style={{ background:`linear-gradient(135deg, ${C.accentSoft}, ${C.energyDim})`, borderRadius:14, padding:20, border:`1px solid ${C.accent}33`, marginBottom:20 }}>
          <h4 style={{ fontFamily:fD, fontSize:17, fontWeight:400, color:C.text, margin:"0 0 8px" }}>
            Get your Week {Math.min(checkinTarget + 1, 4)} curve delivered
          </h4>
          <p style={{ color:C.textMuted, fontSize:12, fontFamily:fS, margin:"0 0 16px", lineHeight:1.5 }}>
            We'll send your personalized curve, insights, and calendar blocks to your inbox Sunday morning,
            ready for your week-ahead planning.
          </p>
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            <input type="email" value={deliveryEmail} onChange={e => setDeliveryEmail(e.target.value)}
              placeholder="your@email.com"
              style={{ ...inputSt, flex:1, fontSize:13, padding:"10px 14px", background:C.bg }} />
            <button onClick={handleDeliverySubmit}
              disabled={!deliveryEmail || !deliveryEmail.includes("@")}
              style={{ ...priBtn, fontSize:12, padding:"10px 16px", whiteSpace:"nowrap",
                opacity:!deliveryEmail||!deliveryEmail.includes("@")?0.4:1 }}>
              Send me my curve
            </button>
          </div>
        </div>
      )}

      {deliveryStatus === "confirming" && (
        <div style={{ background:`linear-gradient(135deg, ${C.accentSoft}, ${C.energyDim})`, borderRadius:14, padding:20, border:`1px solid ${C.accent}33`, marginBottom:20 }}>
          <h4 style={{ fontFamily:fD, fontSize:17, fontWeight:400, color:C.text, margin:"0 0 8px" }}>
            Before we send
          </h4>
          <p style={{ color:C.textMuted, fontSize:12, fontFamily:fS, margin:"0 0 12px", lineHeight:1.6 }}>
            To generate your personalized curve each week, we need to save a copy of your profile.
            Here's exactly what that means:
          </p>
          <div style={{ background:C.bg, borderRadius:10, padding:"12px 14px", marginBottom:12, border:`1px solid ${C.border}` }}>
            <div style={{ color:C.textMuted, fontSize:11, fontFamily:fS, lineHeight:1.6 }}>
              <span style={{ color:C.text, fontWeight:600 }}>What we save:</span> your nickname, age range, sleep times, chronotype, and any family members you've added.
              Plus your weekly check-in responses so your curve keeps improving.
            </div>
            <div style={{ color:C.textMuted, fontSize:11, fontFamily:fS, lineHeight:1.6, marginTop:6 }}>
              <span style={{ color:C.text, fontWeight:600 }}>What we do with it:</span> generate your weekly curve and email it to <span style={{ color:C.accent }}>{deliveryEmail}</span>. Nothing else.
            </div>

      {deliveryStatus === "sent" && (
        <div style={{ background:C.energyDim, borderRadius:14, padding:"16px 20px", marginBottom:20, border:`1px solid ${C.energy}33`, display:"flex", gap:10, alignItems:"center" }}>
          <span style={{ fontSize:18 }}>✓</span>
          <div>
            <span style={{ color:C.energy, fontSize:13, fontWeight:600, fontFamily:fS }}>You're signed up</span>
            <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS, display:"block", marginTop:2 }}>
              Your Week {Math.min(checkinTarget + 1, 4)} package arrives Sunday morning at {deliveryEmail}
            </span>
          </div>
        </div>
      )}

      {/* Status message — real users wait for Monday */}
      {checkinTarget < 4 ? (
        <div style={{ background:C.surface, borderRadius:12, padding:"16px 20px", border:`1px solid ${C.border}` }}>
          <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
            <span style={{ fontSize:16, marginTop:1 }}>📅</span>
            <div>
              <span style={{ color:C.text, fontSize:13, fontWeight:600, fontFamily:fS, display:"block", marginBottom:4 }}>
                Week {checkinTarget + 1} unlocks Monday
              </span>
              <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS, lineHeight:1.5 }}>
                {deliveryStatus === "sent"
                  ? `Your refined curve arrives Sunday morning at ${deliveryEmail}. Come back Monday to continue.`
                  : "Your check-in is saved. Come back Monday to see how your curve has evolved."}
              </span>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ background:C.energyDim, borderRadius:12, padding:20, border:`1px solid ${C.energy}33` }}>
          <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:12 }}>
            <span style={{ fontSize:20 }}>🎉</span>
            <span style={{ color:C.energy, fontSize:16, fontWeight:600, fontFamily:fS }}>
              PoC complete
            </span>
          </div>
          <p style={{ color:C.textMuted, fontSize:13, fontFamily:fS, margin:"0 0 16px", lineHeight:1.6 }}>
            Four weeks of your rhythm, mapped. You now have a sharper picture of your energy
            than most people ever build. Thank you for being part of this.
          </p>
          <p style={{ color:C.textMuted, fontSize:12, fontFamily:fS, margin:"0 0 16px", lineHeight:1.5 }}>
            We're building Curve into a full app. Your feedback shapes what comes next.
          </p>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            <button onClick={() => {
              // Placeholder: replace with actual survey URL
              window.open("https://docs.google.com/forms/d/e/1FAIpQLSe5fyAaTcJEs7dZf4zKoot-mw9jhPt10lcKAaSsiPcpW8ib0A/viewform", "_blank");
            }} style={{ ...priBtn, width:"100%", padding:"12px", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
              📝 Share your feedback (2 min)
            </button>
            <button onClick={() => {
              // Placeholder: replace with actual waitlist URL
              window.open("https://docs.google.com/forms/d/e/1FAIpQLSe5fyAaTcJEs7dZf4zKoot-mw9jhPt10lcKAaSsiPcpW8ib0A/viewform", "_blank");
            }} style={{ ...secBtn, width:"100%", padding:"12px", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
              🔔 Join the waitlist for the full app
            </button>
          </div>
        </div>
      )}

      {/* Back to current week view */}
      <button onClick={() => setShowCelebration(false)}
        style={{ ...secBtn, width:"100%", marginTop:12, padding:"12px", fontSize:13 }}>
        Back to my curve
      </button>

      {/* Demo tool — for testing the full flow in one session */}
      {checkinTarget < 4 && (
        <button onClick={handleCelebrationDone}
          style={{ width:"100%", padding:"10px", marginTop:16, background:"none",
            border:`1px dashed ${C.border}`, borderRadius:8,
            color:C.textDim, fontSize:10, fontFamily:fS, cursor:"pointer" }}>
          ⚙ Demo: unlock Week {checkinTarget + 1} now
        </button>
      )}
    </div>
  );

  return (
    <div style={{ padding:"20px 20px" }}>

      {/* Week 1 first reveal — wow moment */}
      {isFirstReveal && (
        <div style={{ textAlign:"center", padding:"20px 0 24px" }}>
          <h2 style={{ fontFamily:fD, fontSize:28, fontWeight:300, color:C.text, margin:"0 0 8px", letterSpacing:"-0.02em" }}>
            {profile.nickname}, meet your <span style={{ color:C.accent, fontWeight:500 }}>curve</span>
          </h2>
          <p style={{ color:C.textMuted, fontSize:13, fontFamily:fS, margin:"0 0 4px", lineHeight:1.5 }}>
            This is your energy rhythm, shaped by your age, sleep pattern, and chronotype.
            {isFamily ? " Below you'll see how your family's rhythms interact." : ""}
          </p>
          <p style={{ color:C.textDim, fontSize:11, fontFamily:fS, margin:0 }}>
            It gets more personal each week as you check in.
          </p>
        </div>
      )}

      {/* Standard header — shown after first check-in */}
      {!isFirstReveal && (
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <h2 style={{ fontFamily:fD, fontSize:22, fontWeight:300, color:C.text, margin:0 }}>
            {isFamily ? "Family" : profile.nickname+"'s"} <span style={{ color:C.accent, fontWeight:500 }}>Curves</span>
          </h2>
          <button onClick={onReset} style={{ ...secBtn, padding:"8px 14px", fontSize:11 }}>Reset</button>
        </div>
      )}

      {/* Week nav — hidden on first reveal */}
      {!isFirstReveal && (
      <div style={{ display:"flex", gap:6, marginBottom:16 }}>
        {[1,2,3,4].map(w => {
          const act=viewWeek===w, fut=w>currentWeek, hd=w<currentWeek||(weeklyData["self"]||{})[w];
          return (<button key={w} onClick={()=>!fut&&setViewWeek(w)} disabled={fut} style={{
            flex:1, padding:"10px 0", borderRadius:10, border:`1.5px solid ${act?C.accent:C.border}`,
            background:act?C.accentSoft:"transparent", color:fut?C.textDim:act?C.accent:C.textMuted,
            fontSize:12, fontWeight:600, fontFamily:fS, cursor:fut?"not-allowed":"pointer", opacity:fut?0.4:1,
          }}>Wk {w}{hd&&!fut&&w<currentWeek?<span style={{display:"block",fontSize:9,opacity:0.7}}>✓</span>:null}
          {w===currentWeek?<span style={{display:"block",fontSize:9,color:C.energy}}>current</span>:null}</button>);
        })}
      </div>
      )}

      {isFamily && <div style={{ display:"flex", background:C.surface, borderRadius:10, padding:3, marginBottom:16, border:`1px solid ${C.border}` }}>
        {["individual","family"].map(v => (<button key={v} onClick={()=>setView(v)} style={{
          flex:1, padding:"9px 0", borderRadius:8, border:"none", background:view===v?C.accent:"transparent",
          color:view===v?C.bg:C.textMuted, fontSize:12, fontWeight:600, fontFamily:fS, cursor:"pointer", textTransform:"capitalize",
        }}>{v}</button>))}
      </div>}

      <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
        {allCurves.map(c => (<button key={c.id} onClick={()=>setFocusMember(c.id)} style={{
          display:"flex", alignItems:"center", gap:5, padding:"5px 10px", borderRadius:7,
          background:focusMember===c.id?c.color+"22":"transparent", border:`1.5px solid ${focusMember===c.id?c.color:C.border}`,
          color:focusMember===c.id?c.color:C.textMuted, fontSize:11, fontWeight:600, fontFamily:fS, cursor:"pointer",
        }}><div style={{width:7,height:7,borderRadius:4,background:c.color}}/>{c.label}{c.isDrummer?" ♩":""}</button>))}
        {viewWeek>1 && <button onClick={()=>setShowComparison(!showComparison)} style={{
          padding:"5px 10px", borderRadius:7, fontSize:11, fontWeight:600, fontFamily:fS, cursor:"pointer",
          background:showComparison?C.textDim+"22":"transparent", border:`1.5px solid ${showComparison?C.textDim:C.border}`,
          color:showComparison?C.text:C.textDim,
        }}>{showComparison?"Hide":"Compare"} Wk {viewWeek-1}</button>}
      </div>

      {/* What changed summary — shows on weeks 2+ for the focused member */}
      {viewWeek > 1 && prevCurves && (() => {
        const curr = allCurves.find(c => c.id === focusMember);
        const prev = prevCurves.find(c => c.id === focusMember);
        if (!curr || !prev) return null;
        const amShift = Math.round((curr.curve.amPeak.t - prev.curve.amPeak.t) * 60);
        const pmShift = Math.round((curr.curve.pmPeak.t - prev.curve.pmPeak.t) * 60);
        const dipShift = Math.round((curr.curve.dip.t - prev.curve.dip.t) * 60);
        const changes = [];
        if (Math.abs(amShift) >= 5) changes.push(`AM peak shifted ${Math.abs(amShift)}min ${amShift > 0 ? "later" : "earlier"}`);
        if (Math.abs(pmShift) >= 5) changes.push(`PM peak shifted ${Math.abs(pmShift)}min ${pmShift > 0 ? "later" : "earlier"}`);
        if (Math.abs(dipShift) >= 5) changes.push(`dip moved ${Math.abs(dipShift)}min ${dipShift > 0 ? "later" : "earlier"}`);
        if (curr.curve.freefallPoint && prev.curve.freefallPoint) {
          const ffShift = Math.round((curr.curve.freefallPoint.t - prev.curve.freefallPoint.t) * 60);
          if (Math.abs(ffShift) >= 5) changes.push(`freefall shifted ${Math.abs(ffShift)}min ${ffShift > 0 ? "later" : "earlier"}`);
        }
        if (changes.length === 0) return null;
        return (
          <div style={{ background:C.accentSoft, borderRadius:10, padding:"10px 14px", marginBottom:12, border:`1px solid ${C.accent}33`, display:"flex", gap:8, alignItems:"flex-start" }}>
            <span style={{ fontSize:12, flexShrink:0 }}>📊</span>
            <span style={{ color:C.accent, fontSize:12, fontFamily:fS, lineHeight:1.5 }}>
              <span style={{ fontWeight:600 }}>Since last week:</span> {curr.label}'s {changes.join(", ")}.
            </span>
          </div>
        );
      })()}

      <div style={{ background:C.surface, borderRadius:14, padding:"14px 8px", border:`1px solid ${C.border}`, marginBottom:16, overflowX:"auto" }}>
        <CurveChart curves={displayCurves} width={660} height={280} showLabels={true} focusIndex={Math.max(0,focusIdx)} />
      </div>

      <div style={{ display:"grid", gridTemplateColumns:focusCurve.curve.freefallPoint?"1fr 1fr 1fr 1fr":"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
        <MetricCard label="AM Peak" value={`~${formatTime(focusCurve.curve.amPeak.t)}`} color={C.energy} small={!!focusCurve.curve.freefallPoint}/>
        <MetricCard label="Afternoon Dip" value={`~${formatTime(focusCurve.curve.dip.t)}`} color={C.dip} small={!!focusCurve.curve.freefallPoint}/>
        <MetricCard label="PM Peak" value={`~${formatTime(focusCurve.curve.pmPeak.t)}`} color={C.warm} small={!!focusCurve.curve.freefallPoint}/>
        {focusCurve.curve.freefallPoint && <MetricCard label="Freefall" value={`~${formatTime(focusCurve.curve.freefallPoint.t)}`} color={C.red} small/>}
      </div>

      {focusCurve.nudge && (() => {
        const n = focusCurve.nudge;
        const isChild = n.bedtimeShift !== undefined;
        const hasChange = isChild
          ? (n.phiDelta!==0 || n.bedtimeShift!==0 || n.onsetGapAdjust!==0)
          : (n.phiDelta!==0 || n.amp1Delta!==0 || n.amp2Delta!==0);
        if (!hasChange) return null;
        return (
          <div style={{ background:C.surface, borderRadius:10, padding:"10px 14px", marginBottom:12, border:`1px solid ${C.border}`, display:"flex", gap:8 }}>
            <span style={{fontSize:13}}>🔄</span>
            <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS, lineHeight:1.5 }}>
              Adjusted from check-in:
              {n.phiDelta!==0&&<span style={{color:C.accent}}> phase {n.phiDelta>0?"+":""}{(n.phiDelta*60).toFixed(0)}min</span>}
              {!isChild && n.amp1Delta!==0&&<span style={{color:C.energy}}> AM {n.amp1Delta>0?"↑":"↓"}{Math.abs(n.amp1Delta*100).toFixed(0)}%</span>}
              {!isChild && n.amp2Delta!==0&&<span style={{color:C.warm}}> PM {n.amp2Delta>0?"↑":"↓"}{Math.abs(n.amp2Delta*100).toFixed(0)}%</span>}
              {isChild && n.bedtimeShift!==0&&<span style={{color:C.amber}}> bedtime {n.bedtimeShift>0?"+":""}{(n.bedtimeShift*60).toFixed(0)}min</span>}
              {isChild && n.onsetGapAdjust!==0&&<span style={{color:C.red}}> freefall gap {n.onsetGapAdjust>0?"+":""}{(n.onsetGapAdjust*60).toFixed(0)}min</span>}
            </span>
          </div>
        );
      })()}

      {focusChild && focusCurve.curve.freefallPoint && (() => {
        const displayBedtime = focusCurve.adjustedBedtime || focusChild.bedtime;
        return (
          <div style={{ background:C.surface, borderRadius:10, padding:"10px 14px", marginBottom:12, border:`1px solid ${C.border}`, display:"flex", gap:8 }}>
            <span style={{fontSize:13}}>🌙</span>
            <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS, lineHeight:1.5 }}>
              {focusChild.nickname}'s energy <span style={{color:C.red,fontWeight:600}}>freefalls</span> ~{formatTime(focusCurve.curve.freefallPoint.t)} — {focusCurve.adjustedGap ? focusCurve.adjustedGap.toFixed(1) : "1¾"}h before {formatTime(displayBedtime)} bedtime.
            </span>
          </div>
        );
      })()}

      {/* Technical parameters — for focused adult member */}
      {!focusChild && (() => {
        const memberProfile = focusMember === "self" ? profile : (focusMember === "partner" ? partner : null);
        if (!memberProfile || !memberProfile.ageRange) return null;
        const band = getAgeBand(AGE_MAP[memberProfile.ageRange] || 32);
        const msf = calculateMSF(memberProfile.freeSleep, memberProfile.freeWake);
        const phi = calculatePhiChrono(msf, band.msf_ce);
        const likert = memberProfile.likert || 3;

        // Contextual explanations
        const phiMin = Math.round(Math.abs(phi) * 60);
        const phiDir = phi >= 0 ? "later" : "earlier";
        const phiExplain = phiMin < 5
          ? "Your natural rhythm closely matches the average for your age group."
          : `Your natural rhythm runs about ${phiMin} minutes ${phiDir} than average for your age group.`;

        const msfHour = Math.floor(msf % 24);
        const msfMin = Math.round((msf % 1) * 60);
        const msfStr = `${msfHour}:${String(msfMin).padStart(2, "0")}am`;
        const msfExplain = "Your body's midpoint of sleep on free days. This is your biological clock's anchor.";

        const chronoLabels = ["a strong morning type", "a moderate morning type", "neither morning nor evening", "a moderate evening type", "a strong evening type"];
        const chronoExplain = likert <= 2
          ? "You peak early. Your sharpest energy comes in the morning and fades earlier in the evening."
          : likert >= 4
          ? "You lean toward evening. Your energy builds later and lasts longer into the night."
          : "You're flexible. Your energy distributes fairly evenly between morning and evening.";

        return (
          <div style={{ background:C.surface, borderRadius:12, padding:16, border:`1px solid ${C.border}`, marginBottom:16 }}>
            <h4 style={{ ...secTitle, margin:"0 0 12px", fontSize:11 }}>Your Chronobiology</h4>

            <div style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS }}>φ_chrono</span>
                <span style={{ color:C.accent, fontSize:13, fontFamily:fS, fontWeight:600 }}>{phi >= 0 ? "+" : ""}{phi.toFixed(2)}h</span>
              </div>
              <span style={{ color:C.textDim, fontSize:11, fontFamily:fS, lineHeight:1.4 }}>{phiExplain}</span>
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS }}>MSF (mid-sleep free)</span>
                <span style={{ color:C.text, fontSize:13, fontFamily:fS, fontWeight:600 }}>{msfStr}</span>
              </div>
              <span style={{ color:C.textDim, fontSize:11, fontFamily:fS, lineHeight:1.4 }}>{msfExplain}</span>
            </div>

            <div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS }}>Chronotype</span>
                <span style={{ color:C.text, fontSize:13, fontFamily:fS, fontWeight:600 }}>{likert}/5</span>
              </div>
              <span style={{ color:C.textDim, fontSize:11, fontFamily:fS, lineHeight:1.4 }}>{chronoExplain}</span>
            </div>
          </div>
        );
      })()}

      {view==="family" && allCurves.length>1 && <FamilyInsights curves={allCurves} drummer={drummer}/>}

      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        {canCheckin && !hasCheckin && <button onClick={()=>{setCheckinTarget(currentWeek);setShowCheckin(true);}} style={{...priBtn,flex:1,fontSize:13,padding:"12px 16px"}}>
          Log Week {currentWeek} Check-in
        </button>}
        {canCheckin && hasCheckin && <button onClick={()=>{setCheckinTarget(currentWeek);setShowCheckin(true);}} style={{...secBtn,flex:1,fontSize:13,padding:"12px 16px"}}>
          Edit Week {currentWeek} Check-in
        </button>}
      </div>

      {/* Deadline reminder */}
      {canCheckin && !hasCheckin && (
        <div style={{ background:C.surface, borderRadius:10, padding:"10px 14px", marginBottom:12, border:`1px solid ${C.border}`, display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ fontSize:13 }}>⏰</span>
          <span style={{ color:C.textMuted, fontSize:12, fontFamily:fS, lineHeight:1.5 }}>
            Check in by <span style={{ color:C.accent, fontWeight:600 }}>Saturday</span> to receive your refined Week {currentWeek + 1} curve Sunday morning.
            {deliveryStatus === "sent" ? ` We'll send it to ${deliveryEmail}.` : ""}
          </span>
        </div>
      )}

      {/* Post check-in status */}
      {hasCheckin && deliveryStatus === "sent" && (
        <div style={{ background:C.energyDim, borderRadius:10, padding:"10px 14px", marginBottom:12, border:`1px solid ${C.energy}33`, display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ fontSize:13 }}>✓</span>
          <span style={{ color:C.energy, fontSize:12, fontFamily:fS }}>
            Week {currentWeek} logged. Your refined curve arrives Sunday at {deliveryEmail}
          </span>
        </div>
      )}

      <div style={{ background:C.surface, borderRadius:12, padding:14, border:`1px solid ${C.border}` }}>
        <h4 style={{ ...secTitle, margin:"0 0 10px", fontSize:11 }}>Week {viewWeek} — All Members</h4>
        {allCurves.map(c => (
          <div key={c.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{width:8,height:8,borderRadius:4,background:c.color}}/><span style={{color:C.text,fontSize:13,fontFamily:fS,fontWeight:500}}>{c.label}</span>
              {c.isDrummer&&<span style={{fontSize:9,color:C.amber,fontFamily:fS}}>♩</span>}
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <span style={{color:C.energy,fontSize:11,fontFamily:fS}}>{formatTime(c.curve.amPeak.t)}</span>
              <span style={{color:C.dip,fontSize:11,fontFamily:fS}}>{formatTime(c.curve.dip.t)}</span>
              <span style={{color:C.warm,fontSize:11,fontFamily:fS}}>{formatTime(c.curve.pmPeak.t)}</span>
              {c.curve.freefallPoint&&<span style={{color:C.red,fontSize:11,fontFamily:fS}}>↓{formatTime(c.curve.freefallPoint.t)}</span>}
            </div>
          </div>
        ))}
      </div>

      <div style={{ marginTop:20, textAlign:"center" }}>
        <span style={{ color:C.textDim, fontSize:11, fontFamily:fS }}>
          Curve PoC • Week {currentWeek} of 4 • Check in by Saturday, curve delivered Sunday
        </span>
      </div>
    </div>
  );
}

function CurvePoC() {
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState({
    nickname:"", gender:"", ageRange:"",
    freeSleep:23.5, freeWake:8.5, workSleep:22.5, workWake:6.5, likert:3, mode:"",
  });
  const [partner, setPartner] = useState({
    nickname:"", gender:"", ageRange:"",
    freeSleep:23.5, freeWake:8.5, workSleep:22.5, workWake:6.5, likert:3,
  });
  const [children, setChildren] = useState([]);
  const [drummer, setDrummer] = useState(null);
  const updateProfile = (u) => setProfile(p => ({...p,...u}));
  const updatePartner = (u) => setPartner(p => ({...p,...u}));
  const reset = () => {
    setStep(0);
    setProfile({nickname:"",gender:"",ageRange:"",freeSleep:23.5,freeWake:8.5,workSleep:22.5,workWake:6.5,likert:3,mode:""});
    setPartner({nickname:"",gender:"",ageRange:"",freeSleep:23.5,freeWake:8.5,workSleep:22.5,workWake:6.5,likert:3});
    setChildren([]); setDrummer(null);
  };
  const handleModeNext = () => { if (profile.mode==="family") setStep(5); else setStep(10); };
  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet" />
      <div style={{ maxWidth:520, margin:"0 auto", minHeight:"100vh", background:C.bg, fontFamily:fS }}>
        {step===0&&<StepWelcome onNext={()=>setStep(1)}/>}
        {step===1&&<StepBasics data={profile} onUpdate={updateProfile} onNext={()=>setStep(2)} onBack={()=>setStep(0)}/>}
        {step===2&&<StepSleep data={profile} onUpdate={updateProfile} onNext={()=>setStep(3)} onBack={()=>setStep(1)}/>}
        {step===3&&<StepChronotype data={profile} onUpdate={updateProfile} onNext={()=>setStep(4)} onBack={()=>setStep(2)}/>}
        {step===4&&<StepMode data={profile} onUpdate={updateProfile} onNext={handleModeNext} onBack={()=>setStep(3)}/>}
        {step===5&&<StepPartner partner={partner} onUpdate={updatePartner} onNext={()=>setStep(6)} onBack={()=>setStep(4)}/>}
        {step===6&&<StepChildren children={children} onUpdate={setChildren} onNext={()=>setStep(7)} onBack={()=>setStep(5)}/>}
        {step===7&&<StepDrummer children={children} drummer={drummer} onSelect={setDrummer} onNext={()=>setStep(10)} onBack={()=>setStep(6)}/>}
        {step===10&&<DashboardWithWeeks profile={profile} partner={partner} children={children} drummer={drummer} onReset={reset}/>}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CurvePoC));
  </script>
</body>
</html>
